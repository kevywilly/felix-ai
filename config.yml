debug: True
vehicle:
  min_rpm: 30
  max_rpm: 205
  wheel_radius: 0.0485
  wheel_base: 0.19
  track_width: 0.265
  gear_ratio: 56
  motor_voltage: 12
joystick:
  dampening_factor: 0.5
peripherals:
  yaboom: /dev/myserial
  joystick:
    dampening:
      mode: 1
      curve_factor: 0.5
tof:
  threshold: 200
  use_in_autodrive: False
nav_capture_frequency_seconds: 0.5
autodrive:
  linear: 0.32
  angular: 1.0
  # Output smoothing (units/sec) via the shared TwistSmoother. High = near-instant
  # (default, ~unchanged behaviour); lower these for a gentler ride. Stops snap.
  slew_linear: 3.0
  slew_angular: 12.0
seek:
  # Object-seek follow tuning (felix/nodes/object_seeker.py). linear/angular
  # default to the autodrive gains when omitted, so behaviour is unchanged
  # unless these are set.
  linear: 0.32            # forward gain (toward target)
  angular: 1.0            # yaw gain (re-aim camera for large lateral error)
  strafe: 0.4             # lateral gain — slide to centre without yawing. Sign
                          # follows the codebase convention +y=left / -y=right
                          # (REP-103), confirmed by autodriver.py's evade branch:
                          # a target on the right strafes right.
  deadband: 0.06          # |x_rel| below this -> no lateral/yaw correction (kills hunting)
  ema_alpha: 0.5          # error smoothing 0<a<=1 (1.0 = no smoothing)
  yaw_crossover: 0.35     # |x_rel| above this also yaws to re-aim; below = strafe only
  slew_linear: 1.5        # max change in linear cmd per second (smooth accel/decel)
  slew_angular: 5.0       # max change in angular cmd per second
  min_confidence: 0.0     # ignore detections below this confidence (0 = trust detector)
  lock_max_center_dist: 0.2   # keep the same target if a match stays within this (sticky lock)
  coast_frames: 3         # ride last command through this many missed detections (anti-judder)
  lost_timeout: 0.5       # seconds with no fresh detections -> hard stop (watchdog)
  tof_slow_margin_mm: 300 # start slowing this far above the stop threshold (graduated veto)
training:
  mode: ternary
  data_root:          &root /data/felix
  training_path:      !join [*root,/training]
  model_root:         !join [*root,/models]
  navigation_path:    !join [*root,/training/navigation]
  tags_path:          !join [*root,/training/tags]
  driving_data_path:  !join [*root,/training/driving]
model:
  type: resnet50
  use_roi: True
  roi_height_ratio: 0.6
  roi_vertical_offset: 0.4
  roi_horizontal_offset: 1.0
camera:
  # mode 4 = 1280x720 @ 59fps (16:9). Matches the 960x540 (16:9) output so the
  # frame isn't stretched. Mode 3 (1640x1232, 4:3) gave a wider FOV but squeezed
  # into 16:9. CameraCapture publishes this frame to the model/detector too, so
  # the aspect must stay consistent with the obstacle-avoidance training data.
  sensor_mode: 4
  fov: 160
camera_calibration: 
  image_width: 1640
  image_height: 1232
  camera_name: narrow_stereo
  camera_matrix:
    rows: 3
    cols: 3
    data: [804.43002,   0.     , 840.24672,
            0.     , 803.05029, 635.00151,
            0.     ,   0.     ,   1.     ]
  distortion_model: plumb_bob
  distortion_coefficients:
    rows: 1
    cols: 5
    data: [-0.296054, 0.064942, -0.001960, -0.001250, 0.000000]
  rectification_matrix:
    rows: 3
    cols: 3
    data: [1., 0., 0.,
          0., 1., 0.,
          0., 0., 1.]
  projection_matrix:
    rows: 3
    cols: 4
    data: [562.32599,   0.     , 833.99395,   0.     ,
            0.     , 619.90656, 640.45111,   0.     ,
            0.     ,   0.     ,   1.     ,   0.     ]
    sensor_mode: 3
    distortion: [-0.296850, 0.061372, 0.002562, -0.002645, 0.000000]
    matrix: [804.43002,0.     , 840.24672,0.     , 803.05029, 635.00151,
            0.     ,   0.     ,   1.     ]
